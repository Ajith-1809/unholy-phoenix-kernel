name: Build Unholy Phoenix Kernel

on:
  push:
    branches: [ main, master, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: 'Kernel source branch/tag'
        required: false
        default: 'v2.2'
      ksu_version:
        description: 'KernelSU-Next version'
        required: false
        default: 'v3.2.0'
      susfs_tag:
        description: 'SusFS tag'
        required: false
        default: '1.4.2-kernel-4.14'

env:
  KERNEL_SOURCE: kernel_source
  TOOLCHAIN: proton-clang
  SUSFS: susfs4ksu
  ANYKERNEL: AnyKernel3

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
        docker image prune -af 2>/dev/null || true
        df -h

    - name: Setup environment
      run: |
        echo "=== Setting up build environment ==="
        sudo apt-get update -y
        sudo apt-get install -y \
          build-essential bc bison flex curl git zip unzip \
          libssl-dev libelf-dev cpio libncurses-dev wget \
          python3 gcc g++ clang lld llvm \
          device-tree-compiler rsync gcc-arm-linux-gnueabi \
          gcc-aarch64-linux-gnu
        
        echo "=== Installed versions ==="
        gcc --version | head -1
        clang --version | head -1
        make --version | head -1

    - name: Clone kernel source
      run: |
        echo "=== Cloning kernel source ==="
        KERNEL_TAG="${{ github.event.inputs.kernel_tag || 'v2.2' }}"
        git clone --depth 1 -b $KERNEL_TAG \
          https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel.git \
          ${{ env.KERNEL_SOURCE }}
        echo "Kernel version:"
        head -6 ${{ env.KERNEL_SOURCE }}/Makefile

    - name: Clone toolchain
      run: |
        echo "=== Cloning Proton Clang ==="
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git \
          ${{ env.TOOLCHAIN }}
        echo "Clang version:"
        ${{ env.TOOLCHAIN }}/bin/clang --version | head -1

    - name: Clone KernelSU-Next
      run: |
        KSU_VERSION="${{ github.event.inputs.ksu_version || 'v3.2.0' }}"
        echo "=== Cloning KernelSU-Next $KSU_VERSION ==="
        
        cd ${{ env.KERNEL_SOURCE }}
        git clone --branch $KSU_VERSION --depth 1 \
          https://github.com/KernelSU-Next/KernelSU-Next.git || \
        git clone --depth 1 \
          https://github.com/KernelSU-Next/KernelSU-Next.git
        
        # Create symlink
        rm -rf drivers/kernelsu 2>/dev/null || true
        ln -sf ../KernelSU-Next/kernel drivers/kernelsu || \
          cp -r KernelSU-Next/kernel drivers/kernelsu
        
        # Ensure Makefile/Kconfig
        grep -q "kernelsu" drivers/Makefile || \
          (echo "" >> drivers/Makefile && echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile)
        grep -q "kernelsu" drivers/Kconfig || \
          sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        
        echo "KernelSU-Next integrated:"
        ls -la drivers/kernelsu/ | head -5

    - name: Clone SusFS (latest v1.5.1)
      run: |
        echo "=== Cloning SusFS v1.5.1 (latest, backporting to kernel 4.14) ==="
        
        git clone --depth 1 \
          https://gitlab.com/simonpunk/susfs4ksu.git ${{ env.SUSFS }} || \
        git clone --depth 1 \
          https://github.com/simonpunk/susfs4ksu.git ${{ env.SUSFS }} || \
        echo "WARNING: Failed to clone SusFS"
        
        if [ -d "${{ env.SUSFS }}" ]; then
          cd ${{ env.SUSFS }}
          SUSFS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          echo "SusFS version: $SUSFS_TAG"
        fi

    - name: Integrate SusFS
      run: |
        echo "=== Integrating SusFS ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        if [ -d "${{ github.workspace }}/${{ env.SUSFS }}" ]; then
          # Apply KernelSU-Next patches
          if [ -d "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/KernelSU-Next" ]; then
            echo "Applying KSU SusFS patches..."
            for patch in "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/KernelSU-Next"/*.patch; do
              [ -f "$patch" ] && echo "  - $(basename $patch)" && \
              cp "$patch" ./KernelSU-Next/ && \
              cd KernelSU-Next && \
              yes | patch -p1 --forward < "$(basename $patch)" 2>/dev/null || true && \
              cd ..
            done
          fi
          
          # Apply kernel patches
          if [ -d "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches" ]; then
            echo "Applying kernel patches..."
            for patch in "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches"/*.patch; do
              [ -f "$patch" ] && echo "  - $(basename $patch)" && \
              yes | patch -p1 -F 3 --forward < "$patch" 2>/dev/null || true
            done
          fi
          
          # Copy files
          [ -d "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/fs" ] && \
            cp -r "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/fs"/* ./fs/ 2>/dev/null || true
          [ -d "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/include" ] && \
            cp -r "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/include"/* ./include/ 2>/dev/null || true
          [ -d "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/arch" ] && \
            cp -r "${{ github.workspace }}/${{ env.SUSFS }}/kernel_patches/arch"/* ./arch/ 2>/dev/null || true
          
          echo "SusFS integrated"
        fi

    - name: Backport SusFS v1.5.1 features to kernel 4.14
      run: |
        echo "=== Backporting SusFS v1.5.1 features ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        # Backport HIDE_KSU_SUSFS_SYMBOLS
        if ! grep -q "HIDE_KSU_SUSFS_SYMBOLS" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting HIDE_KSU_SUSFS_SYMBOLS..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
extern void susfs_hide_ksu_suspend_symbols(void);
extern void susfs_show_ksu_suspend_symbols(void);
#endif
EOF
        fi
        
        # Backport SPOOF_CMDLINE_OR_BOOTCONFIG
        if ! grep -q "SPOOF_CMDLINE_OR_BOOTCONFIG" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting SPOOF_CMDLINE_OR_BOOTCONFIG..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
extern int susfs_set_spoof_cmdline_or_bootconfig(char __user *user_buf, size_t buf_len);
extern int susfs_get_spoof_cmdline_or_bootconfig(char *buf, size_t buf_len);
#endif
EOF
        fi
        
        # Backport OPEN_REDIRECT
        if ! grep -q "OPEN_REDIRECT" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting OPEN_REDIRECT..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT
struct st_susfs_open_redirect {
    char target_pathname[256];
    char redirected_pathname[256];
};
extern int susfs_add_open_redirect(struct st_susfs_open_redirect __user *user_info);
extern int susfs_get_redirected_path(const char *pathname, char *buf, size_t buf_len);
#endif
EOF
        fi
        
        # Backport AUTO_ADD_SUS_BIND_MOUNT
        if ! grep -q "AUTO_ADD_SUS_BIND_MOUNT" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting AUTO_ADD_SUS_BIND_MOUNT..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
extern void susfs_auto_add_sus_bind_mount(const char *pathname);
extern bool susfs_is_sus_mount(unsigned long mnt_id);
#endif
EOF
        fi
        
        # Backport AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
        if ! grep -q "AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
extern void susfs_auto_add_try_umount_for_bind_mount(const char *pathname);
extern void susfs_try_umount_all(uid_t uid);
#endif
EOF
        fi
        
        # Backport AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
        if ! grep -q "AUTO_ADD_SUS_KSU_DEFAULT_MOUNT" include/linux/susfs.h 2>/dev/null; then
          echo "Backporting AUTO_ADD_SUS_KSU_DEFAULT_MOUNT..."
          cat >> include/linux/susfs.h << 'EOF'

/* Backported from SusFS v1.5.1 */
#ifdef CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
extern void susfs_auto_add_sus_ksu_default_mount(const char *pathname);
#endif
EOF
        fi
        
        echo "SusFS v1.5.1 features backported"

    - name: Apply kernel 4.14 backports
      run: |
        echo "=== Applying kernel 4.14 backports ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        # Fix selinux_cred()
        if grep -q "selinux_cred(cred)" KernelSU-Next/kernel/selinux/selinux.c 2>/dev/null; then
          echo "Patching selinux_cred()..."
          sed -i '/#if LINUX_VERSION_CODE < KERNEL_VERSION(6, 18, 0)/,/#else$/{
            s/#if LINUX_VERSION_CODE < KERNEL_VERSION(6, 18, 0)/#if LINUX_VERSION_CODE < KERNEL_VERSION(5, 0, 0)\n    tsec = (struct task_security_struct *)current_cred()->security;\n#elif LINUX_VERSION_CODE < KERNEL_VERSION(6, 18, 0)/
          }' KernelSU-Next/kernel/selinux/selinux.c
        fi
        
        # Fix syscall symbols
        if grep -q "__arm64_sys_ni_syscall" KernelSU-Next/kernel/hook/arm64/syscall_hook.c 2>/dev/null; then
          echo "Patching syscall symbols..."
          sed -i 's/ksu_lookup_symbol("__arm64_sys_ni_syscall")/#if LINUX_VERSION_CODE < KERNEL_VERSION(5, 5, 0)\n        ksu_lookup_symbol("sys_ni_syscall")\n#else\n        ksu_lookup_symbol("__arm64_sys_ni_syscall")\n#endif/' \
            KernelSU-Next/kernel/hook/arm64/syscall_hook.c
        fi
        
        # Fix ksys_close()
        if grep -q "ksys_close(fd)" KernelSU-Next/kernel/infra/su_mount_ns.c 2>/dev/null; then
          echo "Patching ksys_close()..."
          sed -i 's/ksys_close(fd);/#if LINUX_VERSION_CODE < KERNEL_VERSION(5, 0, 0)\n    close_fd(fd);\n#else\n    ksys_close(fd);\n#endif/' \
            KernelSU-Next/kernel/infra/su_mount_ns.c
        fi
        
        echo "Backports applied"

    - name: Add SusFS Kconfig
      run: |
        echo "=== Adding SusFS Kconfig ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        if ! grep -q "KSU_SUSFS" fs/Kconfig 2>/dev/null; then
          cat >> fs/Kconfig << 'KCONFIG'

menuconfig KSU_SUSFS
	bool "SusFS - Root hiding filesystem"
	default n

if KSU_SUSFS

config KSU_SUSFS_SUS_PATH
	bool "Hide suspicious paths"
	default y

config KSU_SUSFS_SUS_MOUNT
	bool "Hide suspicious mounts"
	default y

config KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
	bool "Auto add KSU default mount as suspicious"
	default y

config KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
	bool "Auto add bind mounts as suspicious"
	default y

config KSU_SUSFS_SUS_KSTAT
	bool "Spoof file statistics"
	default y

config KSU_SUSFS_SUS_OVERLAYFS
	bool "Hide overlayfs"
	default y

config KSU_SUSFS_TRY_UMOUNT
	bool "Try unmount suspicious mounts"
	default y

config KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
	bool "Auto add try umount for bind mounts"
	default y

config KSU_SUSFS_SPOOF_UNAME
	bool "Spoof uname"
	default y

config KSU_SUSFS_ENABLE_LOG
	bool "Enable SusFS logging"
	default y

config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
	bool "Hide KSU/SusFS symbols"
	default y

config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
	bool "Spoof cmdline/bootconfig"
	default y

config KSU_SUSFS_OPEN_REDIRECT
	bool "Open redirect support"
	default y

config KSU_SUSFS_SUS_SU
	bool "Suspicious su handling"
	default y

config KSU_SUSFS_HAS_MAGIC_MOUNT
	bool "Magic mount support"
	default y

config KSU_SUSFS_FCHMODAT_HOOK
	bool "Hook fchmodat"
	default y

config KSU_SUSFS_FSTATAT_HOOK
	bool "Hook fstatat"
	default y

config KSU_SUSFS_STATX_HOOK
	bool "Hook statx"
	default y

config KSU_SUSFS_SELINUX_POLICY_INJECTION
	bool "SELinux policy injection"
	default y

endif # KSU_SUSFS
KCONFIG
          echo "SusFS Kconfig added"
        fi

    - name: Configure kernel
      run: |
        echo "=== Configuring kernel ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        DEFCONFIG="arch/arm64/configs/phoenix_defconfig"
        
        # Clean old configs
        sed -i '/^CONFIG_KSU/d' "$DEFCONFIG" 2>/dev/null || true
        sed -i '/^CONFIG_SECURITY_SELINUX/d' "$DEFCONFIG" 2>/dev/null || true
        
        # Add new configs
        cat >> "$DEFCONFIG" << 'EOF'

# KernelSU-Next v3.2.0 & SusFS v2.0.0 (v1.5.1 backported)
CONFIG_KPROBES=y
CONFIG_KSU=y
CONFIG_KSU_DEBUG=n
CONFIG_KSU_SUSFS=y
CONFIG_KSU_SUSFS_SUS_PATH=y
CONFIG_KSU_SUSFS_SUS_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
CONFIG_KSU_SUSFS_SUS_KSTAT=y
CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
CONFIG_KSU_SUSFS_TRY_UMOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
CONFIG_KSU_SUSFS_SPOOF_UNAME=y
CONFIG_KSU_SUSFS_ENABLE_LOG=y
CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
CONFIG_KSU_SUSFS_SUS_SU=y
CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
CONFIG_KSU_SUSFS_FCHMODAT_HOOK=y
CONFIG_KSU_SUSFS_FSTATAT_HOOK=y
CONFIG_KSU_SUSFS_STATX_HOOK=y
CONFIG_SECURITY_SELINUX=y
CONFIG_KSU_SUSFS_SELINUX_POLICY_INJECTION=y
EOF
        echo "Config ready"

    - name: Build kernel
      run: |
        echo "=== Building kernel ==="
        cd ${{ env.KERNEL_SOURCE }}
        
        export PATH="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin:$PATH"
        
        mkdir -p out
        cp arch/arm64/configs/phoenix_defconfig out/.config
        make O=out ARCH=arm64 oldconfig < /dev/null 2>&1 || true
        
        echo "Starting build..."
        make -j$(nproc) O=out \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          HOSTLD=ld \
          HOSTCFLAGS="-fcommon" \
          KBUILD_HOSTCFLAGS="-fcommon" \
          ARCH=arm64 \
          CC="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/clang" \
          CROSS_COMPILE="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/aarch64-linux-gnu-" \
          CROSS_COMPILE_ARM32="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/arm-linux-gnueabi-" \
          LD="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/ld.lld" \
          AR="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/llvm-ar" \
          NM="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/llvm-nm" \
          OBJCOPY="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/llvm-objcopy" \
          OBJDUMP="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/llvm-objdump" \
          STRIP="${{ github.workspace }}/${{ env.TOOLCHAIN }}/bin/llvm-strip" \
          Image.gz-dtb 2>&1 | tee ${{ github.workspace }}/build.log

    - name: Package
      run: |
        echo "=== Packaging ==="
        KERNEL_IMAGE="${{ env.KERNEL_SOURCE }}/out/arch/arm64/boot/Image.gz-dtb"
        
        if [ -f "$KERNEL_IMAGE" ]; then
          echo "Image found: $(ls -lh $KERNEL_IMAGE)"
          
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ${{ env.ANYKERNEL }}
          cd ${{ env.ANYKERNEL }}
          
          cp "$KERNEL_IMAGE" ./
          sed -i 's/device.name1=.*/device.name1=phoenix/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=phoenixin/' anykernel.sh
          
          zip -r9 ../AnyKernel-PocoX2.zip * -x .git
          echo "Package created"
        else
          echo "ERROR: Image not found"
          tail -100 ${{ github.workspace }}/build.log
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel-PocoX2-KSUNext-SusFS
        path: AnyKernel-PocoX2.zip
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: AnyKernel-PocoX2.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
