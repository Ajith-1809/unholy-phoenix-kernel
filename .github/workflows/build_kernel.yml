name: Build Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Free disk
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc && docker image prune -af
    - name: Setup
      run: sudo apt-get update -y && sudo apt-get install -y build-essential bc bison flex curl git zip unzip libssl-dev libelf-dev cpio libncurses-dev wget python3 gcc g++ clang lld llvm device-tree-compiler rsync gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu
    - name: Clone kernel (Unholy_KSUN+SUSFS - already has SusFS integrated)
      run: git clone --depth 1 -b Unholy_KSUN+SUSFS https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel.git kernel_source
    - name: Clone toolchain
      run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git proton-clang
    - name: Replace original KernelSU with KSU-Next v3.2.0-legacy
      run: |
        cd kernel_source
        rm -rf drivers/kernelsu
        rm -rf KernelSU KernelSU-Next
        git clone --branch v3.2.0-legacy --depth 1 https://github.com/KernelSU-Next/KernelSU-Next.git
        ln -sf ../KernelSU-Next/kernel drivers/kernelsu || cp -r KernelSU-Next/kernel drivers/kernelsu
        if ! grep -q "kernelsu" drivers/Makefile; then
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
        fi
        if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
          sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        fi
    - name: Create bridge for KSU-Next <-> SusFS
      run: |
        cd kernel_source
        printf '#include <linux/version.h>\n#include <linux/fs.h>\n#include <linux/mount.h>\n#include <linux/namei.h>\n#include <linux/path.h>\n#include <linux/cred.h>\n#include <linux/sched.h>\n#include <linux/syscalls.h>\n#include "selinux/selinux.h"\n#include "policy/app_profile.h"\n\nbool susfs_is_current_ksu_domain(void) {\n    return is_ksu_domain();\n}\nbool susfs_is_current_zygote_domain(void) {\n    return is_zygote(current_cred());\n}\n\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nvoid ksu_try_umount(const char *mnt, bool check_mnt, int flags, uid_t uid) {\n    struct path path;\n    int err = kern_path(mnt, 0, &path);\n    if (err) return;\n    if (check_mnt && path.dentry != path.mnt->mnt_root) {\n        path_put(&path);\n        return;\n    }\n#if LINUX_VERSION_CODE >= KERNEL_VERSION(5, 9, 0) || defined(KSU_HAS_PATH_UMOUNT)\n    extern int path_umount(struct path *path, int flags);\n    err = path_umount(&path, flags);\n    if (err) pr_warn("susfs: umount %s failed: %d\\n", mnt, err);\n#else\n    path_put(&path);\n    {\n        char __user *usermnt = (char __user *)mnt;\n        mm_segment_t old_fs = get_fs();\n        set_fs(KERNEL_DS);\n#if LINUX_VERSION_CODE >= KERNEL_VERSION(4, 17, 0)\n        ksys_umount(usermnt, flags);\n#else\n        sys_umount(usermnt, flags);\n#endif\n        set_fs(old_fs);\n    }\n#endif\n}\n#endif\n\n#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\nvoid susfs_try_umount_all(uid_t uid) {\n    extern void susfs_try_umount(uid_t uid);\n    susfs_try_umount(uid);\n    ksu_try_umount("/system", true, 0, uid);\n    ksu_try_umount("/system_ext", true, 0, uid);\n    ksu_try_umount("/vendor", true, 0, uid);\n    ksu_try_umount("/product", true, 0, uid);\n    ksu_try_umount("/odm", true, 0, uid);\n    ksu_try_umount("/data/adb/modules", false, MNT_DETACH, uid);\n    ksu_try_umount("/debug_ramdisk", true, MNT_DETACH, uid);\n}\n#endif\n\n#ifdef CONFIG_KSU_SUSFS_SUS_SU\nstatic bool ksu_susfs_sus_su_enabled = false;\nvoid ksu_susfs_enable_sus_su(void) { ksu_susfs_sus_su_enabled = true; }\nvoid ksu_susfs_disable_sus_su(void) { ksu_susfs_sus_su_enabled = false; }\n#endif\n\nvoid ksu_escape_to_root(void) {\n    escape_with_root_profile();\n}\n' > drivers/kernelsu/susfs_bridge.c
        if ! grep -q "susfs_bridge.o" drivers/kernelsu/Kbuild; then
          sed -i '/kernelsu-objs += extras.o/a kernelsu-objs += susfs_bridge.o' drivers/kernelsu/Kbuild
        fi
        echo "Bridge created and added to Kbuild"
    - name: Add SusFS proc_umounted stubs
      run: |
        cd kernel_source
        if ! grep -q "TASK_STRUCT_PROC_UMOUNTED" include/linux/susfs_def.h; then
          sed -i '/TASK_STRUCT_NON_ROOT_USER_APP_PROC/a #define TASK_STRUCT_PROC_UMOUNTED BIT(25)' include/linux/susfs_def.h
          printf '#define susfs_set_current_proc_umounted() do { current->susfs_task_state |= TASK_STRUCT_PROC_UMOUNTED; } while(0)\n#define susfs_is_current_proc_umounted() (!!(current->susfs_task_state & TASK_STRUCT_PROC_UMOUNTED))\n' >> include/linux/susfs_def.h
        fi
    - name: Ensure Kconfig has KSU_SUSFS
      run: |
        cd kernel_source
        sed -i '/^CONFIG_KSU/d' arch/arm64/configs/phoenix_defconfig 2>/dev/null
        if ! grep -q "CONFIG_KSU_SUSFS" arch/arm64/configs/phoenix_defconfig; then
          printf '\nCONFIG_KPROBES=y\nCONFIG_KRETPROBES=y\nCONFIG_KSU=y\nCONFIG_KSU_KPROBES_HOOK=y\nCONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\nCONFIG_KSU_SUSFS_SUS_KSTAT=y\nCONFIG_KSU_SUSFS_SUS_OVERLAYFS=y\nCONFIG_KSU_SUSFS_TRY_UMOUNT=y\nCONFIG_KSU_SUSFS_SPOOF_UNAME=y\nCONFIG_KSU_SUSFS_ENABLE_LOG=y\nCONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y\nCONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y\nCONFIG_KSU_SUSFS_OPEN_REDIRECT=y\nCONFIG_KSU_SUSFS_SUS_SU=y\nCONFIG_KSU_SUSFS_SELINUX_POLICY_INJECTION=y\n' >> arch/arm64/configs/phoenix_defconfig
        fi
    - name: Build
      run: |
        cd kernel_source
        export PATH=${{ github.workspace }}/proton-clang/bin:$PATH
        mkdir -p out
        cp arch/arm64/configs/phoenix_defconfig out/.config
        make O=out ARCH=arm64 oldconfig < /dev/null 2>&1 || true
        make -j$(nproc) O=out HOSTCC=gcc HOSTCXX=g++ HOSTLD=ld HOSTCFLAGS=-fcommon KBUILD_HOSTCFLAGS=-fcommon ARCH=arm64 CC="${{ github.workspace }}/proton-clang/bin/clang" CROSS_COMPILE="${{ github.workspace }}/proton-clang/bin/aarch64-linux-gnu-" CROSS_COMPILE_ARM32="${{ github.workspace }}/proton-clang/bin/arm-linux-gnueabi-" LD="${{ github.workspace }}/proton-clang/bin/ld.lld" AR="${{ github.workspace }}/proton-clang/bin/llvm-ar" NM="${{ github.workspace }}/proton-clang/bin/llvm-nm" OBJCOPY="${{ github.workspace }}/proton-clang/bin/llvm-objcopy" OBJDUMP="${{ github.workspace }}/proton-clang/bin/llvm-objdump" STRIP="${{ github.workspace }}/proton-clang/bin/llvm-strip" Image.gz-dtb 2>&1 | tee ${{ github.workspace }}/build.log
    - name: Package
      run: |
        if [ -f kernel_source/out/arch/arm64/boot/Image.gz-dtb ]; then
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel_source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=phoenix/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=phoenixin/' anykernel.sh
          sed -i 's/BLOCK=.*/BLOCK=auto;/' anykernel.sh
          sed -i '/backup_file init.rc/d' anykernel.sh
          sed -i '/replace_string init.rc/d' anykernel.sh
          sed -i '/init.tuna/d' anykernel.sh
          sed -i '/fstab.tuna/d' anykernel.sh
          sed -i '/backup_file fstab.tuna/d' anykernel.sh
          sed -i '/patch_fstab/d' anykernel.sh
          sed -i '/insert_line init.tuna/d' anykernel.sh
          sed -i '/append_file fstab.tuna/d' anykernel.sh
          zip -r9 ../AnyKernel-PocoX2.zip * -x .git README.md placeholder
        else
          echo "Image not found!"
          tail -200 build.log
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: AnyKernel-PocoX2
        path: AnyKernel-PocoX2.zip
        if-no-files-found: ignore
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
