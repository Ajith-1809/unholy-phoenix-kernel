name: Build Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Free disk
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc && docker image prune -af
    - name: Setup
      run: sudo apt-get update -y && sudo apt-get install -y build-essential bc bison flex curl git zip unzip libssl-dev libelf-dev cpio libncurses-dev wget python3 gcc g++ clang lld llvm device-tree-compiler rsync gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu
    - name: Clone kernel
      run: git clone --depth 1 -b Unholy https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel.git kernel_source
    - name: Clone toolchain
      run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git proton-clang
    - name: Clone KernelSU-Next legacy-susfs
      run: |
        cd kernel_source
        git clone --branch legacy-susfs --depth 1 https://github.com/KernelSU-Next/KernelSU-Next.git
        rm -rf drivers/kernelsu 2>/dev/null
        ln -sf ../KernelSU-Next/kernel drivers/kernelsu || cp -r KernelSU-Next/kernel drivers/kernelsu
        echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
        sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
    - name: Clone SusFS
      run: git clone --depth 1 -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu || git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu || true
    - name: Apply SusFS kernel patch
      run: |
        cd kernel_source
        cp ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch ./
        # Try applying with increasing fuzz factors
        patch -p1 -F3 --forward < 50_add_susfs_in_kernel-4.14.patch 2>&1 || \
        patch -p1 -F5 --forward < 50_add_susfs_in_kernel-4.14.patch 2>&1 || \
        patch -p1 -F10 --forward < 50_add_susfs_in_kernel-4.14.patch 2>&1 || \
        echo "WARN: Some patch hunks may have failed - will fix manually"
        echo "Patch application done"
    - name: Copy SusFS files
      run: |
        cd kernel_source
        # Copy fs source files (susfs.c, sus_su.c)
        cp -r ../susfs4ksu/kernel_patches/fs/* ./fs/ 2>/dev/null || true
        # Copy include headers (susfs.h, susfs_def.h, sus_su.h)
        cp -r ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/ 2>/dev/null || true
        echo "SusFS files copied"
    - name: Ensure fs/Makefile has susfs.o
      run: |
        cd kernel_source
        if ! grep -q "susfs.o" fs/Makefile; then
          sed -i '/^obj-y.*nsfs.o/a obj-$(CONFIG_KSU_SUSFS) += susfs.o' fs/Makefile
          echo "Added susfs.o to fs/Makefile"
        else
          echo "fs/Makefile already has susfs.o"
        fi
    - name: Ensure task_struct has susfs fields
      run: |
        cd kernel_source
        if ! grep -q "susfs_task_state" include/linux/sched.h; then
          # Add susfs fields before randomized_struct_fields_end
          sed -i '/randomized_struct_fields_end/i #ifdef CONFIG_KSU_SUSFS\n\tu64 susfs_task_state;\n\tu64 susfs_last_fake_mnt_id;\n#endif' include/linux/sched.h
          echo "Added susfs fields to task_struct"
        else
          echo "task_struct already has susfs fields"
        fi
    - name: Ensure mount.h has susfs field
      run: |
        cd kernel_source
        if ! grep -q "susfs_mnt_id_backup" include/linux/mount.h; then
          sed -i '/void \*data;/a #ifdef CONFIG_KSU_SUSFS\n\tu64 susfs_mnt_id_backup;\n#endif' include/linux/mount.h
          echo "Added susfs_mnt_id_backup to vfsmount"
        else
          echo "mount.h already has susfs field"
        fi
    - name: Add susfs_set_current_proc_umounted stubs
      run: |
        cd kernel_source
        # Add the flag definition to susfs_def.h
        if ! grep -q "TASK_STRUCT_PROC_UMOUNTED" include/linux/susfs_def.h; then
          sed -i '/TASK_STRUCT_NON_ROOT_USER_APP_PROC/a #define TASK_STRUCT_PROC_UMOUNTED BIT(25)' include/linux/susfs_def.h
          echo "Added TASK_STRUCT_PROC_UMOUNTED flag"
        fi
        # Add function declarations to susfs.h
        if ! grep -q "susfs_set_current_proc_umounted" include/linux/susfs.h; then
          cat >> include/linux/susfs.h << 'HEADER_EOF'

/* proc_umounted stubs for KSU-Next legacy-susfs compatibility */
static inline void susfs_set_current_proc_umounted(void) {
    current->susfs_task_state |= TASK_STRUCT_PROC_UMOUNTED;
}
static inline bool susfs_is_current_proc_umounted(void) {
    return !!(current->susfs_task_state & TASK_STRUCT_PROC_UMOUNTED);
}
HEADER_EOF
          echo "Added susfs_set_current_proc_umounted stubs to susfs.h"
        fi
    - name: Apply KSU Kconfig from SusFS
      run: |
        cd kernel_source
        cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/ 2>/dev/null || true
        if [ -f KernelSU/10_enable_susfs_for_ksu.patch ]; then
          cd KernelSU
          patch -p1 --forward < 10_enable_susfs_for_ksu.patch 2>&1 || echo "WARN: KSU Kconfig patch may have partial failures"
        fi
        echo "KSU Kconfig done"
    - name: Add SusFS Kconfig to fs
      run: |
        cd kernel_source
        if ! grep -q "KSU_SUSFS" fs/Kconfig; then
          cat >> fs/Kconfig << 'KCONF_EOF'
menuconfig KSU_SUSFS
	bool "SusFS"
	default n
if KSU_SUSFS
config KSU_SUSFS_SUS_PATH
	bool "Hide suspicious paths"
	default y
config KSU_SUSFS_SUS_MOUNT
	bool "Hide suspicious mounts"
	default y
config KSU_SUSFS_SUS_KSTAT
	bool "Spoof file stats"
	default y
config KSU_SUSFS_SUS_OVERLAYFS
	bool "Hide overlayfs"
	default y
config KSU_SUSFS_TRY_UMOUNT
	bool "Try unmount"
	default y
config KSU_SUSFS_SPOOF_UNAME
	bool "Spoof uname"
	default y
config KSU_SUSFS_ENABLE_LOG
	bool "Enable logging"
	default y
config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
	bool "Hide symbols"
	default y
config KSU_SUSFS_OPEN_REDIRECT
	bool "Open redirect"
	default y
config KSU_SUSFS_SUS_SU
	bool "Suspicious su"
	default y
config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
	bool "Spoof cmdline"
	default y
config KSU_SUSFS_SELINUX_POLICY_INJECTION
	bool "SELinux policy injection"
	default y
endif
KCONF_EOF
          echo "Added SusFS Kconfig"
        else
          echo "SusFS Kconfig already present"
        fi
    - name: Configure
      run: |
        cd kernel_source
        sed -i '/^CONFIG_KSU/d' arch/arm64/configs/phoenix_defconfig 2>/dev/null
        sed -i '/^CONFIG_SECURITY_SELINUX/d' arch/arm64/configs/phoenix_defconfig 2>/dev/null
        cat >> arch/arm64/configs/phoenix_defconfig << 'DEFCONFIG_EOF'

CONFIG_KPROBES=y
CONFIG_KSU=y
CONFIG_KSU_SUSFS=y
CONFIG_KSU_SUSFS_SUS_PATH=y
CONFIG_KSU_SUSFS_SUS_MOUNT=y
CONFIG_KSU_SUSFS_SUS_KSTAT=y
CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
CONFIG_KSU_SUSFS_TRY_UMOUNT=y
CONFIG_KSU_SUSFS_SPOOF_UNAME=y
CONFIG_KSU_SUSFS_ENABLE_LOG=y
CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
CONFIG_KSU_SUSFS_SUS_SU=y
CONFIG_KSU_SUSFS_SELINUX_POLICY_INJECTION=y
CONFIG_SECURITY_SELINUX=y
DEFCONFIG_EOF
        echo "Defconfig updated"
    - name: Build
      run: |
        cd kernel_source
        export PATH=${{ github.workspace }}/proton-clang/bin:$PATH
        mkdir -p out
        cp arch/arm64/configs/phoenix_defconfig out/.config
        make O=out ARCH=arm64 oldconfig < /dev/null 2>&1 || true
        make -j$(nproc) O=out \
          HOSTCC=gcc HOSTCXX=g++ HOSTLD=ld \
          HOSTCFLAGS=-fcommon KBUILD_HOSTCFLAGS=-fcommon \
          ARCH=arm64 \
          CC="${{ github.workspace }}/proton-clang/bin/clang" \
          CROSS_COMPILE="${{ github.workspace }}/proton-clang/bin/aarch64-linux-gnu-" \
          CROSS_COMPILE_ARM32="${{ github.workspace }}/proton-clang/bin/arm-linux-gnueabi-" \
          LD="${{ github.workspace }}/proton-clang/bin/ld.lld" \
          AR="${{ github.workspace }}/proton-clang/bin/llvm-ar" \
          NM="${{ github.workspace }}/proton-clang/bin/llvm-nm" \
          OBJCOPY="${{ github.workspace }}/proton-clang/bin/llvm-objcopy" \
          OBJDUMP="${{ github.workspace }}/proton-clang/bin/llvm-objdump" \
          STRIP="${{ github.workspace }}/proton-clang/bin/llvm-strip" \
          Image.gz-dtb 2>&1 | tee ${{ github.workspace }}/build.log
    - name: Package
      run: |
        if [ -f kernel_source/out/arch/arm64/boot/Image.gz-dtb ]; then
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel_source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=phoenix/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=phoenixin/' anykernel.sh
          sed -i 's/BLOCK=.*/BLOCK=auto;/' anykernel.sh
          sed -i '/backup_file init.rc/d' anykernel.sh
          sed -i '/replace_string init.rc/d' anykernel.sh
          sed -i '/init.tuna/d' anykernel.sh
          sed -i '/fstab.tuna/d' anykernel.sh
          sed -i '/backup_file fstab.tuna/d' anykernel.sh
          sed -i '/patch_fstab/d' anykernel.sh
          sed -i '/insert_line init.tuna/d' anykernel.sh
          sed -i '/append_file fstab.tuna/d' anykernel.sh
          zip -r9 ../AnyKernel-PocoX2.zip * -x .git README.md placeholder
        else
          echo "Image not found!"
          tail -200 build.log
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: AnyKernel-PocoX2
        path: AnyKernel-PocoX2.zip
        if-no-files-found: ignore
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
